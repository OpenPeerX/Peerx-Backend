name-template: 'PeerX v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['enhancement', 'feature']
  patch:
    labels: ['bug', 'docs', 'dependencies', 'ci']
  default: patch
categories:
  - title: '🚨 Breaking changes'
    labels: ['breaking']
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug fixes'
    labels: ['bug']
  - title: '🛠 Maintenance'
    labels: ['chore', 'ci', 'dependencies']
  - title: '📚 Documentation'
    labels: ['docs']
template: |
  ## PeerX $RESOLVED_VERSION
  $CHANGES
